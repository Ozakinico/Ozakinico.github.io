<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>207 Multi-Status</title>
<style>
body{margin:0;height:100vh;display:grid;place-items:center;background:#eef2ff;font-family:sans-serif;color:#312e81}
.card{width:min(520px,86vw);padding:40px;border-radius:28px;background:white;box-shadow:0 20px 50px #0002}
.code{text-align:center;font-size:88px;font-weight:900}
h1{text-align:center}
p{text-align:center;line-height:1.8}
.box{margin-top:24px;display:grid;gap:10px}
.item{padding:12px 16px;border-radius:14px;background:#eef2ff}
.ok{border-left:8px solid #22c55e}
.wait{border-left:8px solid #f59e0b}
.ng{border-left:8px solid #ef4444}
</style>
</head>
<body>
<div class="card">
  <div class="code">207</div>
  <h1>Multi-Status：結果いろいろ</h1>
  <p>まとめて頼まれた処理に、<br>それぞれ別々の結果を返しています。</p>
  <div class="box">
    <div class="item ok">ページA：成功しました</div>
    <div class="item wait">ページB：確認中です</div>
    <div class="item ng">ページC：見つかりませんでした</div>
  </div>
</div>
</body>
</html>
